apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: pd-tcp
spec:
  replicas: 1
  model:
    uri: hf://Qwen/Qwen3-0.6B
    name: Qwen/Qwen3-0.6B
  router:
    route: {}
    gateway: {}
    scheduler:
      template:
        containers:
          - name: main
            args:
              - --pool-name
              - "{{ ChildName .ObjectMeta.Name `-inference-pool` }}"
              - --pool-namespace
              - "{{ .ObjectMeta.Namespace }}"
              - --zap-encoder
              - json
              - --grpc-port
              - "9002"
              - --grpc-health-port
              - "9003"
              - --secure-serving
              - --model-server-metrics-scheme
              - https
              - --model-server-metrics-https-insecure-skip-verify
              - --cert-path
              - /var/run/kserve/tls
              - --config-text
              - |
                apiVersion: inference.networking.x-k8s.io/v1alpha1
                kind: EndpointPickerConfig
                plugins:
                  - type: prefill-header-handler
                  - type: prefill-filter
                  - type: decode-filter
                  - type: max-score-picker
                  - type: queue-scorer
                    parameters:
                      hashBlockSize: 5
                      maxPrefixBlocksToMatch: 256
                      lruCapacityPerServer: 31250
                  - type: pd-profile-handler
                    parameters:
                      threshold: 0
                      hashBlockSize: 5
                schedulingProfiles:
                  - name: prefill
                    plugins:
                      - pluginRef: prefill-filter
                      - pluginRef: queue-scorer
                        weight: 1.0
                      - pluginRef: max-score-picker
                  - name: decode
                    plugins:
                      - pluginRef: decode-filter
                      - pluginRef: queue-scorer
                        weight: 1.0
                      - pluginRef: max-score-picker
  template:
    imagePullSecrets:
    - name: redhat-pull-secret
    containers:
      - name: main
        env:
          - name: VLLM_NIXL_SIDE_CHANNEL_HOST
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: VLLM_ADDITIONAL_ARGS
            value: "--kv_transfer_config '{\"kv_connector\":\"NixlConnector\",\"kv_role\":\"kv_both\"}'"
          - name: UCX_TLS
            value: "tcp,sm,self,cuda_copy,cuda_ipc"
        resources:
          limits:
            cpu: '4'
            memory: 32Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: '2'
            memory: 16Gi
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
  prefill:
    replicas: 2
    template:
      imagePullSecrets:
      - name: redhat-pull-secret
      containers:
        - name: main
          env:
            - name: VLLM_NIXL_SIDE_CHANNEL_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: VLLM_ADDITIONAL_ARGS
              value: "--kv_transfer_config '{\"kv_connector\":\"NixlConnector\",\"kv_role\":\"kv_both\"}'"
            - name: UCX_TLS
              value: "tcp,sm,self,cuda_copy,cuda_ipc"
          resources:
            limits:
              cpu: '4'
              memory: 32Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: '2'
              memory: 16Gi
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTPS
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 5
