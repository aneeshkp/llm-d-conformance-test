name: qwen2-7b-gpu-tp2
description: "2 GPUs - Qwen2.5-7B with tensor parallelism (TP=2)"
labels:
  - gpu
  - single-node-gpu
  - qwen2
  - tensor-parallel
  - tp
model:
  name: Qwen/Qwen2.5-7B-Instruct
  uri: hf://Qwen/Qwen2.5-7B-Instruct
  displayName: qwen2-7b-instruct-tp2
  category: single-node-gpu
  cache:
    enabled: true
    storageSize: 100Gi
    keepPVC: true
    timeout: 60m
deployment:
  manifestPath: qwen2-7b-gpu-tp2.yaml
  replicas: 1
  readyTimeout: 15m
  resources:
    cpu: "4"
    memory: 32Gi
    gpus: 2
    rdma: false
validation:
  healthEndpoint: /health
  healthPort: 8000
  healthScheme: HTTPS
  inferenceCheck: true
  testPrompts:
    - "What is tensor parallelism?"
    - "Explain model sharding across GPUs."
  expectedCodes: [200]
  timeout: 2m
  retryAttempts: 3
  retryInterval: 15s
cleanup: true
