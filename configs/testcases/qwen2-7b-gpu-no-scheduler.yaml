name: qwen2-7b-gpu-no-scheduler
description: "Single-node GPU Qwen2.5-7B without scheduler - K8s native routing"
labels:
  - gpu
  - single-node-gpu
  - qwen2
  - no-scheduler
model:
  name: Qwen/Qwen2.5-7B-Instruct
  uri: hf://Qwen/Qwen2.5-7B-Instruct
  displayName: qwen2-7b-instruct-single-no-scheduler
  category: single-node-gpu
  cache:
    enabled: true
    storageSize: 100Gi
    keepPVC: true
    timeout: 60m
deployment:
  manifestPath: deploy/manifests/qwen2-7b-gpu-no-scheduler.yaml
  replicas: 3
  readyTimeout: 15m
  resources:
    cpu: "4"
    memory: 32Gi
    gpus: 1
    rdma: false
validation:
  healthEndpoint: /health
  healthPort: 8000
  healthScheme: HTTPS
  inferenceCheck: true
  testPrompts:
    - "What is Kubernetes?"
  expectedCodes: [200]
  timeout: 2m
  retryAttempts: 3
  retryInterval: 15s
cleanup: true
