name: opt-125m-cpu
description: "CPU-only OPT-125M model with scheduler - lightweight smoke test"
labels:
  - cpu
  - smoke
  - opt-125m
  - simple
model:
  name: facebook/opt-125m
  uri: hf://facebook/opt-125m
  displayName: facebook-opt-125m-single
  category: cpu
  cache:
    enabled: true
    storageSize: 5Gi
    keepPVC: true
    timeout: 15m
deployment:
  manifestPath: deploy/manifests/opt-125m-cpu.yaml
  namespace: ""  # uses default from profile
  replicas: 1
  readyTimeout: 5m
  containerImage: public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:v0.17.1
  resources:
    cpu: "1"
    memory: 10Gi
    gpus: 0
    rdma: false
validation:
  healthEndpoint: /health
  healthPort: 8000
  healthScheme: HTTP
  inferenceCheck: true
  testPrompts:
    - "What is 2+2?"
    - "Hello world"
  expectedCodes: [200]
  timeout: 2m
  retryAttempts: 3
  retryInterval: 10s
cleanup: true
