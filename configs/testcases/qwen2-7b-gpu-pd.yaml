name: qwen2-7b-gpu-pd
description: "3 GPUs - Qwen2.5-7B P/D with RDMA (2 decode + 1 prefill)"
labels:
  - gpu
  - multi-node-gpu
  - qwen2
  - prefill-decode
  - pd
model:
  name: Qwen/Qwen2.5-7B-Instruct
  uri: hf://Qwen/Qwen2.5-7B-Instruct
  displayName: qwen2-7b-instruct-pd
  category: multi-node-gpu
  cache:
    enabled: true
    storageSize: 100Gi
    keepPVC: true
    timeout: 60m
deployment:
  manifestPath: qwen2-7b-gpu-pd.yaml
  replicas: 1
  readyTimeout: 15m
  networkAttachment: roce-p2
  resources:
    cpu: "4"
    memory: 32Gi
    gpus: 1
    rdma: true
  prefill:
    replicas: 2
    resources:
      cpu: "4"
      memory: 32Gi
      gpus: 1
      rdma: true
validation:
  healthEndpoint: /health
  healthPort: 8000
  healthScheme: HTTPS
  inferenceCheck: true
  testPrompts:
    - "Explain prefill decode disaggregation."
  expectedCodes: [200]
  timeout: 2m
  retryAttempts: 3
  retryInterval: 15s
cleanup: true
