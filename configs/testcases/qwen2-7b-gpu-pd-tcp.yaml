name: qwen2-7b-gpu-pd-tcp
description: "3 GPUs - Qwen2.5-7B P/D over TCP (2 decode + 1 prefill)"
labels:
  - gpu
  - multi-node-gpu
  - qwen2
  - prefill-decode
  - pd
  - tcp
model:
  name: Qwen/Qwen2.5-7B-Instruct
  uri: hf://Qwen/Qwen2.5-7B-Instruct
  displayName: qwen2-7b-instruct-pd-tcp
  category: multi-node-gpu
  cache:
    enabled: true
    storageSize: 100Gi
    keepPVC: true
    timeout: 60m
deployment:
  manifestPath: qwen2-7b-gpu-pd-tcp.yaml
  replicas: 1
  readyTimeout: 15m
  resources:
    cpu: "4"
    memory: 32Gi
    gpus: 1
    rdma: false
validation:
  healthEndpoint: /health
  healthPort: 8000
  healthScheme: HTTPS
  inferenceCheck: true
  testPrompts:
    - "What is prefill decode disaggregation?"
    - "Explain KV cache transfer."
  expectedCodes: [200]
  timeout: 2m
  retryAttempts: 3
  retryInterval: 15s
cleanup: true
