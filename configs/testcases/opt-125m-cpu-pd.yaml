name: opt-125m-cpu-pd
description: "CPU-only OPT-125M with prefill/decode disaggregation"
labels:
  - cpu
  - opt-125m
  - prefill-decode
  - pd
model:
  name: facebook/opt-125m
  uri: hf://facebook/opt-125m
  displayName: facebook-opt-125m-pd
  category: cpu
  cache:
    enabled: true
    storageSize: 5Gi
    keepPVC: true
    timeout: 15m
deployment:
  manifestPath: deploy/manifests/opt-125m-cpu-pd.yaml
  replicas: 1
  readyTimeout: 8m
  containerImage: public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:v0.17.1
  resources:
    cpu: "2"
    memory: 16Gi
    gpus: 0
    rdma: false
  prefill:
    replicas: 1
    resources:
      cpu: "2"
      memory: 16Gi
      gpus: 0
      rdma: false
validation:
  healthEndpoint: /health
  healthPort: 8000
  healthScheme: HTTP
  inferenceCheck: true
  testPrompts:
    - "Explain LLM inference in one sentence."
  expectedCodes: [200]
  timeout: 2m
  retryAttempts: 3
  retryInterval: 10s
cleanup: true
