name: deepseek-r1-dp-ep-ht
description: "DeepSeek-R1-0528 with data/expert parallelism (high throughput, RDMA/RoCE)"
labels:
  - gpu
  - deepseek
  - moe
  - dp-ep
  - rdma
  - multi-node
model:
  name: deepseek-ai/DeepSeek-R1-0528
  uri: pvc://llm-test-pvc-deepseek
  displayName: deepseek-r1-0528
  category: deepseek
  cache:
    enabled: true           # will verify PVC exists since uri is pvc://
    pvcName: llm-test-pvc-deepseek
    storageSize: 500Gi
    keepPVC: true
deployment:
  manifestPath: deploy/manifests/deepseek-r1-dp-ep-ht.yaml
  replicas: 1
  serviceAccount: hfsa
  readyTimeout: 90m
  networkAttachment: roce-p2
  worker: true
  resources:
    cpu: "128"
    memory: 512Gi
    gpus: 8
    ephemeralStorage: 800Gi
    rdma: true
  parallelism:
    data: 32
    dataLocal: 8
    expert: true
    tensor: 1
validation:
  healthEndpoint: /health
  healthPort: 8000
  healthScheme: HTTPS
  inferenceCheck: true
  testPrompts:
    - "What is expert parallelism in MoE models?"
  expectedCodes: [200]
  timeout: 5m
  retryAttempts: 3
  retryInterval: 30s
cleanup: true
