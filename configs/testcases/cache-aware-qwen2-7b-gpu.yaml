name: cache-aware-qwen2-7b-gpu
description: "2 GPUs - Qwen2.5-7B with prefix KV cache-aware routing (2 replicas)"
labels:
  - gpu
  - cache-aware
  - kv-cache
  - qwen2
model:
  name: Qwen/Qwen2.5-7B-Instruct
  uri: hf://Qwen/Qwen2.5-7B-Instruct
  displayName: qwen2-7b-kv-cache-routing
  category: cache-aware
  cache:
    enabled: true
    storageSize: 100Gi
    keepPVC: true
    timeout: 60m
deployment:
  manifestPath: cache-aware-qwen2-7b-gpu.yaml
  replicas: 2
  readyTimeout: 15m
  resources:
    cpu: "4"
    memory: 32Gi
    gpus: 1
    rdma: false
validation:
  healthEndpoint: /health
  healthPort: 8000
  healthScheme: HTTPS
  inferenceCheck: true
  testPrompts:
    - "What is KV cache routing?"
    - "Explain prefix caching in LLM inference."
  expectedCodes: [200]
  timeout: 2m
  retryAttempts: 3
  retryInterval: 15s
cleanup: true
